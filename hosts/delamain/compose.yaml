services:
  stack-agent:
    image: ghcr.io/rcarson/stack-agent:latest
    container_name: stack-agent
    restart: unless-stopped
    environment:
      - HOST_SERVICES_TOKEN=${HOST_SERVICES_TOKEN}
      - STACK_AGENT_LOG_LEVEL=info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/stack-agent/config.yml:/etc/stack-agent/config.yml:ro
      - /opt/steward/config:/opt/steward/config:ro
      - /var/lib/stack-agent:/var/lib/stack-agent
