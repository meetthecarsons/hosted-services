defaults:
  poll_interval: 60
  branch: main
  work_dir: /var/lib/stack-agent/stacks
  token: ${HOST_SERVICES_TOKEN}

stacks:
  - name: vaultwarden
    repo: https://github.com/meetthecarsons/hosted-services.git
    path: stacks/vaultwarden
    env_file: /etc/stacks/vaultwarden.env

  - name: nextcloud
    repo: https://github.com/meetthecarsons/hosted-services.git
    path: stacks/nextcloud
    env_file: /etc/stacks/nextcloud.env
    poll_interval: 120

  - name: mealie
    repo: https://github.com/meetthecarsons/hosted-services.git
    path: stacks/mealie
    env_file: /etc/stacks/mealie.env
