defaults:
  poll_interval: 60
  branch: main
  work_dir: /var/lib/stack-agent/stacks
  token: ${HOST_SERVICES_TOKEN}

stacks:
  - name: arrgh-proton
    repo: https://github.com/meetthecarsons/hosted-services.git
    path: stacks/arrgh-proton
    env_file: /etc/stacks/arrgh-proton.env

  - name: jellyfin
    repo: https://github.com/meetthecarsons/hosted-services.git
    path: stacks/jellyfin
    env_file: /etc/stacks/jellyfin.env

  - name: immich
    repo: https://github.com/meetthecarsons/hosted-services.git
    path: stacks/immich
    env_file: /etc/stacks/immich.env
