services:
  stack-agent:
    image: ghcr.io/rcarson/stack-agent:latest
    container_name: stack-agent
    restart: unless-stopped
    environment:
      - HOST_SERVICES_TOKEN=${HOST_SERVICES_TOKEN}
      - STACK_AGENT_LOG_LEVEL=info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.yml:/opt/steward/config.yml:ro
      - ./config:/opt/steward/config:ro
      - ./data:/opt/steward/data
