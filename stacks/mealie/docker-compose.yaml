services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.3.2
    container_name: mealie
    restart: always
    user: "2000:2000" # Run as apps user to match NFS mount ownership
    ports:
      - "127.0.0.1:9925:9000" # localhost only, Tailscale will proxy
    deploy:
      resources:
        limits:
          memory: 1000M
    volumes:
      - /mnt/ds-s-01/shared/mealie/data:/app/data/
    environment:
      # Set Backend ENV Variables Here
      ALLOW_SIGNUP: "false"
      TZ: America/Los_Angeles
      BASE_URL: https://food.eland-wyrm.ts.net
    networks:
      - mealie

  tailscale:
    image: tailscale/tailscale:latest
    container_name: mealie-tailscale
    restart: unless-stopped
    environment:
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - tailscale-mealie:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    networks:
      - mealie
    depends_on:
      - mealie

networks:
  mealie:
    driver: bridge

volumes:
  tailscale-mealie:
    driver: local
