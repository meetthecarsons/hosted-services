services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.3.2
    container_name: mealie
    restart: always
    user: "2000:2000" # Run as apps user to match NFS mount ownership
    network_mode: service:tailscale  # Share network with Tailscale container for localhost access
    deploy:
      resources:
        limits:
          memory: 1000M
    volumes:
      - ${DATA_DIR}:/app/data/
    environment:
      # Set Backend ENV Variables Here
      ALLOW_SIGNUP: "true"
      TZ: ${TZ}
      BASE_URL: https://${DOMAIN}
      # Email configuration
      SMTP_HOST: smtp.mailgun.org
      SMTP_PORT: 587
      SMTP_FROM_EMAIL: mealie@relay.b0rked.xyz
      SMTP_FROM_NAME: Mealie
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_AUTH_STRATEGY: TLS

  tailscale:
    image: tailscale/tailscale:latest
    container_name: mealie-ts
    restart: unless-stopped
    hostname: ${TS_HOSTNAME}  # Hostname for this node on the tailnet
    environment:
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_EXTRA_ARGS=--advertise-tags=tag:containers
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - mealie-ts:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN

volumes:
  mealie-ts:
    driver: local
