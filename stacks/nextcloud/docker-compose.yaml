services:
  db:
    image: mariadb:11
    container_name: nextcloud-db
    restart: always
    command: --transaction-isolation=READ-COMMITTED --sql-mode=TRADITIONAL
    user: "2000:2000"
    networks:
      - nextcloud-internal
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - /mnt/ds-s-01/shared/nextcloud/db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: always
    command: redis-server --appendonly yes
    user: "2000:2000"
    networks:
      - nextcloud-internal
    volumes:
      - /mnt/ds-s-01/shared/nextcloud/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextcloud:
    image: nextcloud:28-fpm-alpine
    container_name: nextcloud
    restart: always
    user: "2000:2000"
    networks:
      - nextcloud-internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_HOST: db
      REDIS_HOST: redis
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: "cloud.eland-wyrm.ts.net"
      OVERWRITEPROTOCOL: https
      OVERWRITEHOST: cloud.eland-wyrm.ts.net
      SMTP_HOST: smtp.mailgun.org
      SMTP_PORT: 587
      SMTP_NAME: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SECURE: tls
      MAIL_FROM_ADDRESS: ${NEXTCLOUD_MAIL_FROM}
    volumes:
      - /mnt/ds-s-01/shared/nextcloud/data:/var/www/html

  nginx:
    image: nginx:alpine
    container_name: nextcloud-nginx
    restart: always
    network_mode: service:nextcloud-ts
    depends_on:
      - nextcloud
    volumes:
      - /mnt/ds-s-01/shared/nextcloud/data:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 5

  nextcloud-ts:
    image: tailscale/tailscale:latest
    container_name: nextcloud-ts
    hostname: cloud
    restart: unless-stopped
    networks:
      - nextcloud-internal
    environment:
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_EXTRA_ARGS=--advertise-tags=tag:containers
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - nextcloud-ts:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN

  nextcloud-collabora:
    image: collabora/code:latest
    container_name: nextcloud-collabora
    restart: always
    network_mode: service:collabora-ts
    environment:
      - VIRTUAL_HOST=${COLLABORA_HOST}
      - LETSENCRYPT_HOST=${COLLABORA_HOST}
    cap_add:
      - SYS_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9980/health/l"]
      interval: 30s
      timeout: 10s
      retries: 5

  collabora-ts:
    image: tailscale/tailscale:latest
    container_name: collabora-ts
    hostname: collab
    restart: unless-stopped
    networks:
      - nextcloud-internal
    environment:
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_EXTRA_ARGS=--advertise-tags=tag:containers
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - collabora-ts:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN

volumes:
  nextcloud-ts:
    driver: local
  collabora-ts:
    driver: local

networks:
  nextcloud-internal:
    driver: bridge
