services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    user: "2000:2000" # Run as apps user to match NFS mount ownership
    environment:
      - DOMAIN=${DOMAIN:-https://vault.${TAILSCALE_DOMAIN:-eland-wyrm.ts.net}}
      - SIGNUPS_ALLOWED=${SIGNUPS_ALLOWED:-false}
      - INVITATIONS_ALLOWED=${INVITATIONS_ALLOWED:-true}
      - SHOW_PASSWORD_HINT=${SHOW_PASSWORD_HINT:-false}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/db.sqlite3}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=${LOG_FILE:-/data/vaultwarden.log}
    ports:
      - "127.0.0.1:8000:80"  # Only accessible via localhost, Tailscale will proxy
    volumes:
      - vaultwarden-data:/data
    networks:
      - vaultwarden

  tailscale:
    image: tailscale/tailscale:latest
    container_name: vaultwarden-tailscale
    restart: unless-stopped
    environment:
      - TS_AUTH_KEY=${TS_AUTH_KEY}  # Tailscale auth key for auto-login
      - TS_EXTRA_ARGS=--advertise-tags=tag:vaultwarden # Advertise tags for this container
      - TS_STATE_DIR=/var/lib/tailscale  # Persistent state directory
    volumes:
      - tailscale-vaultwarden:/var/lib/tailscale  # Persistent state
      - /dev/net/tun:/dev/net/tun  # Required for Tailscale
    cap_add:
      - NET_ADMIN  # Required for Tailscale to manage network interfaces
    networks:
      - vaultwarden
    depends_on:
      - vaultwarden

networks:
  vaultwarden:
    driver: bridge

volumes:
  vaultwarden-data:
    driver: local
    driver_opts:
      type: nfs
      o: addr=192.168.50.81,vers=4,soft,timeo=180,bg,rsize=65536,wsize=65536
      device: ":/mnt/fast-pool-01/shared/delamain/vaultwarden/data"
  tailscale-vaultwarden:
    driver: local
