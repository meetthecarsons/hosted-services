services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    user: "2000:2000" # Run as apps user to match NFS mount ownership
    network_mode: service:tailscale  # Share network with Tailscale container for localhost access
    environment:
      - DOMAIN=https://${DOMAIN}
      - SIGNUPS_ALLOWED=true
      - INVITATIONS_ALLOWED=true
      - SHOW_PASSWORD_HINT=false
      - LOG_LEVEL=info
      - LOG_FILE=/data/vaultwarden.log
      - ADMIN_TOKEN=${ADMIN_TOKEN}  # Set this in your .env file for admin access
      - SMTP_HOST=smtp.mailgun.org
      - SMTP_PORT=587
      - SMTP_USERNAME=vault@relay.b0rked.xyz
      - SMTP_PASSWORD=${SMTP_PASSWORD}  # Set this in your .env file for email functionality
      - SMTP_FROM=vault@relay.b0rked.xyz
      - SMTP_FROM_NAME=Vaultwarden
      - SMTP_SECURITY=starttls
    volumes:
      - ${DATA_DIR}:/data  # Bind mount to NFS for persistence

  tailscale:
    image: tailscale/tailscale:latest
    container_name: vaultwarden-ts
    hostname: ${TS_HOSTNAME}  # Hostname for this node on the tailnet
    restart: unless-stopped
    environment:
      - TS_AUTH_KEY=${TS_AUTH_KEY}  # Tailscale auth key for auto-login
      - TS_EXTRA_ARGS=--advertise-tags=tag:containers
      - TS_STATE_DIR=/var/lib/tailscale  # Persistent state directory
    volumes:
      - vaultwarden-ts:/var/lib/tailscale  # Persistent state
      - /dev/net/tun:/dev/net/tun  # Required for Tailscale
    cap_add:
      - NET_ADMIN  # Required for Tailscale to manage network interfaces

volumes:
  vaultwarden-ts:
    driver: local
