services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: "2000:2000"
    network_mode: service:tailscale
    volumes:
      - ./config/prometheus:/etc/prometheus
      - /mnt/fast-pool-01/appdata/prometheus/data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    restart: unless-stopped

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    user: "2000:2000"
    network_mode: service:tailscale
    volumes:
      - /mnt/fast-pool-01/appdata/grafana/data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    #ports:
    #  - "3000:3000"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    user: "2000:2000"
    network_mode: service:tailscale
    volumes:
      - ./config/alertmanager:/etc/alertmanager
      - /mnt/fast-pool-01/appdata/alertmanager/data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --cluster.listen-address=
    restart: unless-stopped

  # Renders the ntfy-alertmanager config from the template, substituting the
  # secret topic from the env. Runs once per `up`; the bridge waits for it.
  ntfy-bridge-config:
    image: busybox:latest
    container_name: ntfy-bridge-config
    environment:
      - NTFY_ALERTS_TOPIC=${NTFY_ALERTS_TOPIC}
    volumes:
      - ./config/ntfy-alertmanager:/in:ro
      - ntfy-bridge-config:/out
    command: sh -c 'sed "s|__NTFY_ALERTS_TOPIC__|$${NTFY_ALERTS_TOPIC}|" /in/config.tpl > /out/config'
    restart: "no"

  ntfy-alertmanager:
    image: xenrox/ntfy-alertmanager:latest
    container_name: ntfy-alertmanager
    network_mode: service:tailscale
    depends_on:
      ntfy-bridge-config:
        condition: service_completed_successfully
    volumes:
      - ntfy-bridge-config:/etc/ntfy-alertmanager:ro
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    network_mode: service:tailscale
    command:
      - --port=8085
      - --docker_only=true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:latest
    container_name: monitoring-ts
    hostname: graf  # Hostname for this node on the tailnet
    restart: unless-stopped
    environment:
      - TS_AUTH_KEY=${TS_AUTH_KEY}  # Tailscale auth key for auto-login
      - TS_EXTRA_ARGS=--advertise-tags=tag:containers
      - TS_STATE_DIR=/var/lib/tailscale  # Persistent state directory
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - monitoring-ts:/var/lib/tailscale  # Persistent state
      - /dev/net/tun:/dev/net/tun  # Required for Tailscale
      - ./ts-serve.json:/config/serve.json:ro
    cap_add:
      - NET_ADMIN  # Required for Tailscale to manage network interfaces

volumes:
  monitoring-ts:
    driver: local
  ntfy-bridge-config:
    driver: local
